name: E2E Test Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Check Go code formatting
  fmt:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Check server formatting
        working-directory: ./server
        run: |
          go fmt ./...
          go vet ./...

      - name: Check client formatting
        working-directory: ./client
        run: |
          go fmt ./...
          go vet ./...

  # Build Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build server image
        run: |
          docker build -t agw-e2e-server:test ./server

      - name: Build client image
        run: |
          docker build -t agw-e2e-client:test ./client

  # Test basic execution
  test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E smoke test
        run: |
          # Start mock server in background
          docker run -d --name test-server -p 8080:8080 -p 8081:8081 \
            -e TEST_CASE_ID=E2E-001 \
            -e BEHAVIOR_ACTION=success \
            -e RESPONSE_CODE=200 \
            -e RESPONSE_BODY='{"code":0,"msg":"success","request_id":"test"}' \
            agw-e2e-server:test

          # Wait for server to start
          sleep 3

          # Run client test
          docker run --rm --network host \
            -e TEST_CASE_ID=E2E-001 \
            -e CALLBACK_ADDRS=localhost:8080 \
            -e EXPECTED_RESPONSE_CODE=0 \
            -e EXPECTED_MSG=success \
            agw-e2e-client:test

          # Cleanup
          docker rm -f test-server || true

  # Verify script is executable
  script:
    name: Verify Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check run-agw-e2e.sh is executable
        run: |
          test -x run-agw-e2e.sh && echo "Script is executable" || exit 1

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('agw-e2e.yaml'))" && echo "YAML is valid"