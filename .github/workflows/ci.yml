name: E2E Test Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Check Go code formatting
  fmt:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Check server formatting
        working-directory: ./server
        run: |
          go fmt ./...
          go vet ./...

      - name: Check client formatting
        working-directory: ./client
        run: |
          go fmt ./...
          go vet ./...

  # Build and E2E test
  build-test:
    name: Build and E2E Test
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run E2E tests
        run: |
          chmod +x scripts/run-agw-e2e.sh
          ./scripts/run-agw-e2e.sh --all --parallel 2

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-logs
          path: |
            scripts/logs/
            scripts/reports/

      - name: Cleanup
        if: always()
        run: |
          ./scripts/run-agw-e2e.sh --cleanup --images || true

  # Verify script is executable
  script:
    name: Verify Scripts
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/run-agw-e2e.sh

      - name: Check run-agw-e2e.sh is executable
        run: |
          test -x scripts/run-agw-e2e.sh && echo "Script is executable" || exit 1

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('scripts/agw-e2e.yaml'))" && echo "YAML is valid"